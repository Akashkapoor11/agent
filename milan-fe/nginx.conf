server {
    listen 5000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # ─── Backend API: proxy /milan-aegis/api/* to the backend container ────────
    # Use a runtime DNS resolver and a variable in proxy_pass so nginx does NOT
    # resolve the upstream hostname at startup. The Aegis AKS pipeline deploys
    # milan-fe and milan-be to separate namespaces, so the hostname must be the
    # cross-namespace FQDN <service>.<namespace>.svc.cluster.local. If the BE
    # service is not yet ready when the FE pod boots, nginx will not crash; it
    # will resolve on each request.
    location ^~ /milan-aegis/api/ {
        resolver kube-dns.kube-system.svc.cluster.local valid=10s ipv6=off;
        set $milan_be_upstream "milan-be.milan-be.svc.cluster.local:5000";
        proxy_pass http://$milan_be_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ─── SPA: serve the static bundle under /milan-aegis-fe/* ──────────────────
    location ^~ /milan-aegis-fe/ {
        rewrite ^/milan-aegis-fe/?(.*)$ /$1 break;
        try_files $uri $uri/index.html @spa_fallback;
    }

    # ─── Legacy redirect: /milan-fe/* → /milan-aegis-fe/* ──────────────────────
    location ^~ /milan-fe/ {
        rewrite ^/milan-fe/(.*)$ /milan-aegis-fe/$1 permanent;
    }
    location = /milan-fe {
        return 301 /milan-aegis-fe/;
    }

    # Internal-only fallback — serves /index.html for client-side routes inside
    # the SPA. Cannot be reached by external URLs (named locations are private).
    location @spa_fallback {
        try_files /index.html =404;
    }

    # ─── Root → SPA ────────────────────────────────────────────────────────────
    location = / {
        return 301 /milan-aegis-fe/;
    }

    # Everything else → 404.
    location / {
        return 404;
    }
}
