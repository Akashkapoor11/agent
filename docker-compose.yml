services:

  # Local Postgres for development. Production deploys use whatever
  # external Postgres URL is set via DB_CON_STR.
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: milan
      POSTGRES_PASSWORD: milan_dev_only
      POSTGRES_DB: milan
    volumes:
      - ./milan-be/sql/milan-ddl.sql:/docker-entrypoint-initdb.d/01-ddl.sql
      - ./milan-be/sql/milan-dml.sql:/docker-entrypoint-initdb.d/02-dml.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U milan -d milan"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Local-only DSN. In production, set DB_CON_STR to your hosted
      # Postgres URL (Render env var, K8s ConfigMap/Secret, etc.).
      DB_CON_STR: "host=db port=5432 dbname=milan user=milan password=milan_dev_only"
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
