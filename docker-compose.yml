services:

  app:
    # Build context is the repo root so the Dockerfile can copy from
    # both milan-be/ and milan-fe/. The image bundles Postgres 16,
    # FastAPI, and the built React FE in a single container.
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      # Persist Postgres across local restarts. On Render's free tier
      # this volume isn't mounted, so the bundled seed reloads each
      # cold start (fine for a read-only demo).
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
