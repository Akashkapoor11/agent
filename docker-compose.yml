services:

  app:
    # Self-contained image bundling Postgres 16 + FastAPI. Build context
    # is milan-be/ so the same image works on Render with
    # Root Directory = milan-be.
    build:
      context: ./milan-be
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      # Persist Postgres data across local restarts. On Render's free
      # tier this volume isn't mounted, so the bundled seed reloads on
      # every cold start (which is fine for a read-only demo).
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
