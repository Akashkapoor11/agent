# Render Blueprint — one-click deploy.
#
# Anyone with a Render account can point New + → Blueprint at this
# repository and Render will provision the entire stack (frontend +
# backend + database) as a single Docker Web Service. No dashboard
# config, no env vars, no separate database, no rewrite rules.
#
# After Apply, Render gives a public URL like https://milan-aegis-XXXX.onrender.com.
# Open that URL in a browser → full Milan Aegis dashboard with real data.

services:
  - type: web
    name: milan-aegis
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./milan-be/Dockerfile
    # Build context = repo root (so the Dockerfile can copy from both
    # milan-be/ and milan-fe/). Leaving rootDir unset keeps it at root.
    healthCheckPath: /
    autoDeploy: true
